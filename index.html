<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sadovskiy.com Test</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: Arial, Helvetica, sans-serif;
      background: #f5f7fb;
      color: #171b24;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    main {
      width: min(100%, 560px);
      border: 1px solid #d8deea;
      border-radius: 8px;
      background: #ffffff;
      padding: 32px;
      box-shadow: 0 16px 40px rgba(17, 24, 39, 0.08);
    }

    h1 {
      margin: 0 0 12px;
      font-size: 32px;
      line-height: 1.15;
    }

    p {
      margin: 0 0 18px;
      font-size: 18px;
      line-height: 1.5;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
    }

    .dot {
      width: 12px;
      height: 12px;
      border-radius: 999px;
      background: #1a7f37;
    }
  </style>
</head>
<body>
  <main>
    <h1>Sadovskiy.com</h1>
    <p>Test page: 1, 2, 3.</p>
    <div class="status"><span class="dot" aria-hidden="true"></span>GitHub Pages is connected.</div>
  </main>
</body>
</html>
